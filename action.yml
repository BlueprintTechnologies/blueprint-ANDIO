name: 'ANDIO Accessibility Scan'
description: 'Static 508/WCAG accessibility scanner for HTML templates — ported from SSA ANDI'
branding:
  icon: 'eye'
  color: 'blue'

inputs:
  paths:
    description: 'Space-separated list of files or directories to scan'
    required: true
  checks:
    description: 'Comma-separated list of check modules to run (default: all)'
    required: false
    default: ''
  fail-on-error:
    description: 'Fail the workflow if error-severity findings exist'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  errors:
    description: 'Number of error-severity findings'
    value: ${{ steps.scan.outputs.errors }}
  warnings:
    description: 'Number of warning-severity findings'
    value: ${{ steps.scan.outputs.warnings }}
  total:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.total }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install ANDIO
      shell: bash
      run: pip install ${{ github.action_path }}

    - name: Run ANDIO scan
      id: scan
      shell: bash
      run: |
        CHECKS_FLAG=""
        if [ -n "${{ inputs.checks }}" ]; then
          CHECKS_FLAG="--checks ${{ inputs.checks }}"
        fi

        # Run scan and capture JSON output
        andio scan ${{ inputs.paths }} --format json $CHECKS_FLAG > /tmp/andio-results.json 2>&1 || true

        # Extract counts from JSON
        ERRORS=$(python3 -c "import json; d=json.load(open('/tmp/andio-results.json')); print(d['summary']['errors'])")
        WARNINGS=$(python3 -c "import json; d=json.load(open('/tmp/andio-results.json')); print(d['summary']['warnings'])")
        INFO=$(python3 -c "import json; d=json.load(open('/tmp/andio-results.json')); print(d['summary']['info'])")
        TOTAL=$((ERRORS + WARNINGS + INFO))

        echo "errors=$ERRORS" >> $GITHUB_OUTPUT
        echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
        echo "total=$TOTAL" >> $GITHUB_OUTPUT

    - name: Generate PR comment
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        python3 << 'PYEOF'
        import json
        import os

        with open("/tmp/andio-results.json") as f:
            data = json.load(f)

        errors = data["summary"]["errors"]
        warnings = data["summary"]["warnings"]
        info = data["summary"]["info"]
        files = data["summary"]["files_scanned"]
        checks_passed = data["summary"].get("checks_passed", 0)
        checks_total = data["summary"].get("checks_total", 0)
        findings = data["findings"]
        not_checked = data["not_checked"]
        check_summaries = data.get("check_summaries", [])

        # Shields.io badge helpers
        def badge(label, value, color):
            label_enc = label.replace(" ", "_").replace("-", "--")
            return f"![{label}: {value}](https://img.shields.io/badge/{label_enc}-{value}-{color}?style=flat-square)"

        # Gate status badge
        if errors == 0:
            gate_badge = badge("508 Compliance", "passed", "brightgreen")
        else:
            gate_badge = badge("508 Compliance", "failed", "red")

        lines = []
        lines.append(gate_badge)
        lines.append("")
        lines.append("**Issues**")
        err_color = "red" if errors > 0 else "brightgreen"
        warn_color = "orange" if warnings > 0 else "brightgreen"
        info_color = "blue"
        lines.append(f"{badge('errors', str(errors), err_color)} {badge('warnings', str(warnings), warn_color)} {badge('info', str(info), info_color)}")

        lines.append("")
        lines.append("**Measures**")
        checks_color = "brightgreen" if checks_passed == checks_total else "orange"
        checks_value = f"{checks_passed}%2F{checks_total}"
        lines.append(
            f"{badge('files scanned', str(files), '4a86cf')} "
            f"{badge('checks passed', checks_value, checks_color)}"
        )

        if check_summaries:
            lines.append("")
            lines.append("**Check modules**")
            lines.append("")
            lines.append("| Module | Status | Findings |")
            lines.append("|--------|--------|----------|")
            for c in check_summaries:
                if c["passed"]:
                    status_badge = f"![passed](https://img.shields.io/badge/-PASSED-brightgreen?style=flat-square)"
                else:
                    status_badge = f"![failed](https://img.shields.io/badge/-FAILED-red?style=flat-square)"
                lines.append(f"| {c['name']} | {status_badge} | {c['finding_count']} |")

        if findings:
            lines.append("")
            lines.append("<details><summary>Findings detail</summary>")
            lines.append("")
            lines.append("| File | Line | Severity | Check | Section 508 / WCAG | Message |")
            lines.append("|------|------|----------|-------|-------------------|---------|")
            for f in sorted(findings, key=lambda x: (x["file_path"], x["line"])):
                fp = f["file_path"]
                workspace = os.environ.get("GITHUB_WORKSPACE", "")
                if workspace and fp.startswith(workspace):
                    fp = fp[len(workspace):].lstrip("/")
                sev = f["severity"]
                sev_color = {"error": "red", "warning": "orange", "info": "blue"}[sev]
                sev_badge = f"![{sev}](https://img.shields.io/badge/-{sev.upper()}-{sev_color}?style=flat-square)"
                wcag = f.get("wcag_linked", f.get("wcag", ""))
                lines.append(f"| `{fp}` | {f['line']} | {sev_badge} | `{f['check_id']}` | {wcag} | {f['message']} |")
            lines.append("")
            lines.append("</details>")

        lines.append("")
        lines.append("<details><summary>Not checked (requires live browser)</summary>")
        lines.append("")
        for item in not_checked:
            lines.append(f"- {item}")
        lines.append("")
        lines.append("</details>")
        lines.append("")
        lines.append("*[ANDIO](https://github.com/BlueprintTechnologies/blueprint-ANDIO) — Accessible Name and Description Inspector Offline*")

        body = "\n".join(lines)

        with open("/tmp/andio-pr-comment.md", "w") as f:
            f.write(body)
        PYEOF

    - name: Post or update PR comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: andio-scan
        path: /tmp/andio-pr-comment.md

    - name: Add inline annotations
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        python3 << 'PYEOF'
        import json
        import os

        with open("/tmp/andio-results.json") as f:
            data = json.load(f)

        workspace = os.environ.get("GITHUB_WORKSPACE", "")
        for f in data["findings"]:
            fp = f["file_path"]
            if workspace and fp.startswith(workspace):
                fp = fp[len(workspace):].lstrip("/")
            level = "error" if f["severity"] == "error" else "warning"
            wcag = f.get("wcag", "")
            wcag_suffix = f" [{wcag}]" if wcag else ""
            msg = f"[{f['check_id']}] {f['message']}{wcag_suffix}"
            print(f"::{level} file={fp},line={f['line']}::{msg}")
        PYEOF

    - name: Write step summary
      shell: bash
      run: |
        andio scan ${{ inputs.paths }} --format github-summary ${{ inputs.checks && format('--checks {0}', inputs.checks) || '' }} >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

    - name: Enforce gate
      if: inputs.fail-on-error == 'true' && steps.scan.outputs.errors != '0'
      shell: bash
      run: |
        echo "::error::ANDIO found ${{ steps.scan.outputs.errors }} accessibility error(s). See PR comment for details."
        exit 1
